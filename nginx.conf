worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 60s;
    keepalive_requests 100000;
    server_tokens off;

    # Round-robin upstream over Unix Domain Sockets to the two API instances.
    # The shared `rinha-sockets` volume mounts /sockets in nginx + each api.
    upstream api {
        server unix:/sockets/api1.sock;
        server unix:/sockets/api2.sock;
        keepalive 64;
    }

    server {
        listen 9999 default_server backlog=4096 reuseport;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            # Required for upstream keepalive — without it nginx sends
            # "Connection: close" to the API and reopens the UDS every request.
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}
