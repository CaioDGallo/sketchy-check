# Sketchy submission (Rust) — fraud detection backend for Rinha de Backend 2026.
#
# Symmetric topology — both APIs serve traffic in parallel for two-process
# parallelism on the 1.00 CPU budget. Mirrors the C #1 reference's compose.
#   haproxy 0.20 CPU + 50 MB
#   api1    0.40 CPU + 150 MB
#   api2    0.40 CPU + 150 MB
#   total   1.00 CPU + 350 MB  (matches the contest cap exactly)

x-api-common: &api-common
  image: caiogallo2401/sketchy-rust:0.3.0
  volumes:
    - rinha-sockets:/sockets
  networks:
    - rinha-net
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

services:
  haproxy:
    image: haproxy:3.3
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - rinha-sockets:/sockets
    networks:
      - rinha-net
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

  api1:
    <<: *api-common
    hostname: api1
    environment:
      UDS_PATH: /sockets/api1.sock
      INDEX_PATH: /app/index.bin
      MCC_RISK_PATH: /app/mcc_risk.json
      IVF_NPROBE: "1"
      IOURING_QD: "4096"
      ACCEPT_SQES: "256"
      MAX_CONNS: "1024"
      WORKERS: "2"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  api2:
    <<: *api-common
    hostname: api2
    environment:
      UDS_PATH: /sockets/api2.sock
      INDEX_PATH: /app/index.bin
      MCC_RISK_PATH: /app/mcc_risk.json
      IVF_NPROBE: "1"
      IOURING_QD: "4096"
      ACCEPT_SQES: "256"
      MAX_CONNS: "1024"
      WORKERS: "2"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
