# Sketchy — fraud detection backend for Rinha de Backend 2026.
#
# Resource budget across all three services:
#   nginx 0.15 CPU + 30 MB
#   api1  0.425 CPU + 160 MB
#   api2  0.425 CPU + 160 MB
#   total 1.00 CPU + 350 MB  (matches the contest cap exactly)

x-api-common: &api-common
  build:
    context: .
    dockerfile: api/Dockerfile
    platforms:
      - linux/amd64
  image: sketchy-api:local
  volumes:
    - rinha-sockets:/sockets
  networks:
    - rinha-net
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  deploy:
    resources:
      limits:
        cpus: "0.425"
        memory: "160MB"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: sketchy-nginx
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - rinha-sockets:/sockets
    networks:
      - rinha-net
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "30MB"

  api1:
    <<: *api-common
    container_name: sketchy-api1
    hostname: api1
    environment:
      UDS_PATH: /sockets/api1.sock
      INDEX_PATH: /app/index.bin
      MCC_RISK_PATH: /app/mcc_risk.json
      IVF_NPROBE: "1"
      GOGC: "off"
      GOMEMLIMIT: "140MiB"
      GOMAXPROCS: "1"

  api2:
    <<: *api-common
    container_name: sketchy-api2
    hostname: api2
    environment:
      UDS_PATH: /sockets/api2.sock
      INDEX_PATH: /app/index.bin
      MCC_RISK_PATH: /app/mcc_risk.json
      IVF_NPROBE: "1"
      GOGC: "off"
      GOMEMLIMIT: "140MiB"
      GOMAXPROCS: "1"

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
