# Sketchy — fraud detection backend for Rinha de Backend 2026.
#
# Resource budget across all three services:
#   haproxy 0.15 CPU + 30 MB
#   api1    0.80 CPU + 160 MB
#   api2    0.05 CPU + 160 MB
#   total 1.00 CPU + 350 MB  (matches the contest cap exactly)

x-api-common: &api-common
  build:
    context: .
    dockerfile: api/Dockerfile
    platforms:
      - linux/amd64
  image: sketchy-api:local
  volumes:
    - rinha-sockets:/sockets
  networks:
    - rinha-net
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

services:
  haproxy:
    image: haproxy:3.3
    container_name: sketchy-haproxy
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - rinha-sockets:/sockets
    networks:
      - rinha-net
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "30MB"

  api1:
    <<: *api-common
    container_name: sketchy-api1
    hostname: api1
    environment:
      UDS_PATH: /sockets/api1.sock
      INDEX_PATH: /app/index.bin
      MCC_RISK_PATH: /app/mcc_risk.json
      IVF_NPROBE: "1"
      GOGC: "off"
      GOMEMLIMIT: "140MiB"
      GOMAXPROCS: "3"
    deploy:
      resources:
        limits:
          cpus: "0.80"
          memory: "160MB"

  api2:
    <<: *api-common
    container_name: sketchy-api2
    hostname: api2
    environment:
      UDS_PATH: /sockets/api2.sock
      INDEX_PATH: /app/index.bin
      MCC_RISK_PATH: /app/mcc_risk.json
      IVF_NPROBE: "1"
      GOGC: "off"
      GOMEMLIMIT: "140MiB"
      GOMAXPROCS: "1"
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "160MB"

networks:
  rinha-net:
    driver: bridge

volumes:
  rinha-sockets:
